name: Build Docker Image

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - .github/**
  workflow_run:
    workflows: ["Upstream Sync"]  # 监听 Upstream Sync 工作流
    types:
      - completed  # 仅在工作流完成时触发
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    if: (github.actor == 'SynapticArch' || github.actor == 'SynapticArch' || github.actor == 'actions-user' || github.actor == 'hapxscom' || github.actor == 'Chloemlla') && !contains(github.event.head_commit.message, 'npm(deps):')
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Set up QEMU
        uses: docker/setup-qemu-action@master

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@master

      - name: Set timezone to Shanghai
        run: |
          sudo ln -sf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
          sudo dpkg-reconfigure -f noninteractive tzdata

      - name: Get timestamp and short SHA
        id: timestamp
        run: |
          echo "::set-output name=timestamp::$(TZ='Asia/Shanghai' date +%s)"
          echo "::set-output name=repo_name::$(echo ${{ github.repository }} | cut -d'/' -f2)"
          echo "::set-output name=short_sha::$(git rev-parse --short HEAD)"

      - name: Get previous commit SHA
        id: prev_commit
        run: echo "::set-output name=prev_sha::$(git rev-parse HEAD^1)"

      - name: Check if only .github folder was modified
        id: check_github_changes
        run: |
          if git diff --name-only HEAD~1 HEAD -- | grep -qv '^.github/'; then
            echo "GITHUB_ONLY_CHANGED=false" >> $GITHUB_ENV
          else
            echo "GITHUB_ONLY_CHANGED=true" >> $GITHUB_ENV
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@master
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@master
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            happyclo/librechat:${{ github.ref_name }}
            happyclo/librechat:${{ steps.timestamp.outputs.short_sha }}
      
      - name: Use Node.js
        uses: actions/setup-node@main
        with:
          node-version: 22

      - name: Set Node.js memory limits
        run: |
          echo "NODE_OPTIONS=--max-old-space-size=5096" >> $GITHUB_ENV
          echo "NPM_CONFIG_CACHE=/tmp/.npm" >> $GITHUB_ENV

      - name: Cache Node.js packages
        uses: actions/cache@main
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Node.js dependencies
        run: |
          pnpm install ssh2 dotenv axios form-data

      - name: Set script permissions
        run: |
          chmod +x scripts/deploy_image.js

      - name: Run deployment script
        if: github.event_name != 'pull_request' || github.actor == 'Chloemlla'
        env:
          SERVER_ADDRESS: ${{ secrets.SERVER_ADDRESS }}
          USERNAME: ${{ secrets.USERNAME }}
          PORT: ${{ secrets.PORT }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          CONTAINER_NAMES: ${{ secrets.CONTAINER_NAMES }}
          IMAGE_URL: happyclo/librechat:${{ steps.timestamp.outputs.short_sha }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          node scripts/deploy_image.js
